# =============================================================================
# general settings
# =============================================================================

set -g base-index 1
setw -g pane-base-index 1
set -g history-limit 50000
set -s escape-time 0
set -g focus-events on
setw -g xterm-keys on
setw -g automatic-rename
set-option -g renumber-windows on


# =============================================================================
# display / colors
# =============================================================================

set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",*256col*:Tc"

set -g window-style        'fg=colour249,bg=#404040'
set -g window-active-style 'fg=colour250,bg=black'
set -g status-style         fg=colour244
set -g window-status-current-style 'bg=black,fg=green'
set -g pane-border-style        'fg=colour235,bg=colour238'
set -g pane-active-border-style 'fg=colour51,bg=colour236'


# =============================================================================
# status bar
# =============================================================================

set -g status-left ''
set -g status-left-length 0
set -g status-right '%Y.%m.%d|%H:%M'
set -g status-right-length 20


# =============================================================================
# mouse
# =============================================================================

set -g mouse off

# allow mouse copy/paste (toggle with prefix + m / M)
bind m set -g mouse on  \; display 'Mouse: ON'
bind M set -g mouse off \; display 'Mouse: OFF'

# scroll support
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" \
    "send-keys -M" \
    "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e; send-keys -M'"

# disable right-click menu
unbind -n MouseDown3Pane

# page up/down scrolling
set -g terminal-overrides 'xterm*:smcup@:rmcup@'


# =============================================================================
# windows
# =============================================================================

bind N   new-window
bind ,   new-window
bind -n M-n new-window

bind -n M-Tab     next-window
bind -n M-S       next-window
bind -n M-pagedown next-window
bind -n M-A       previous-window
bind -n M-pageup  previous-window

bind -n M-W choose-tree -Zw

# rename window / session
bind-key i   command-prompt -I "#W" "rename-window '%%'"
bind -n M-2  command-prompt -I "#W" "rename-window '%%'"
bind -n M-3  command-prompt -I "#S" "rename-session '%%'"


# =============================================================================
# panes
# =============================================================================

# split
bind -n M-( split-window -h
bind -n M-* split-window -v 

# navigate (with prefix)
unbind h
unbind j
unbind k
unbind l
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind -n M-C-Up    select-pane -U
bind -n M-C-Down  select-pane -D
bind -n M-C-Left  select-pane -L
bind -n M-C-Right select-pane -R


# resize (without prefix)
# bind -n M-+     resize-pane -R 5
# bind -n M--     resize-pane -L 5
# bind -n M-'*'   resize-pane -D 5
# bind -n M-_     resize-pane -U 5
# bind -n M-Up    resize-pane -U 5
# bind -n M-Down  resize-pane -D 5
# bind -n M-Right resize-pane -R 5
# bind -n M-Left  resize-pane -L 5

# zoom
bind -n M-Z resize-pane -Z
bind -n M-F resize-pane -Z

# swap pane to edge (with prefix)
bind H splitw -fhb \; swapp -t ! \; killp -t !
bind L splitw -fh  \; swapp -t ! \; killp -t !
bind J splitw -fv  \; swapp -t ! \; killp -t !
bind K splitw -fvb \; swapp -t ! \; killp -t !

# kill
bind-key q kill-pane
bind-key x kill-session

# =============================================================================
# misc bindings
# =============================================================================

# detach session
bind-key -n M-D detach-client

# reload config
bind r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"

# home / end keys
bind-key -n Home send Escape "OH"
bind-key -n End  send Escape "OF"

# send xterm compatible control arrow keys (vim compatibility)
setw -g xterm-keys on


# =============================================================================
# plugins (TPM)
# =============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'
set -g @continuum-restore 'on'
set -g @resurrect-processes 'btop nload journalctl yazi'

# initialize TPM (keep at bottom)
run -b '~/.tmux/plugins/tpm/tpm'
